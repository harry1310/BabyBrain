services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - babybrain

  babybrain:
    build: .
    container_name: babybrain
    restart: unless-stopped
    # Two env files, loaded in order: .env carries persistent secrets,
    # .env.deploy-override is regenerated fresh by scripts/deploy.sh from
    # any KEY=VALUE tokens the workflow passes via $SSH_ORIGINAL_COMMAND.
    # Later entries override earlier ones, so per-deploy overrides win.
    env_file:
      - .env
      - .env.deploy-override
    environment:
      BABYBRAIN_DB_PATH: /data/babybrain.db
      BABYBRAIN_HTML_ARCHIVE_PATH: /data/scrape-html
    # Lets the container reach the laptop fetch service's reverse-SSH tunnel,
    # which terminates on the VPS host (see docs/laptop-fetch.md). Harmless when
    # the laptop feature isn't configured.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # NB: no `ports:` block — Caddy is the only public face.
    volumes:
      - ./data:/data

volumes:
  caddy_data:
  caddy_config:
