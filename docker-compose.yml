services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - babybrain

  babybrain:
    build: .
    container_name: babybrain
    restart: unless-stopped
    # Two env files, loaded in order: .env carries persistent secrets,
    # .env.deploy-override is regenerated fresh by scripts/deploy.sh from
    # any KEY=VALUE tokens the workflow passes via $SSH_ORIGINAL_COMMAND.
    # Later entries override earlier ones, so per-deploy overrides win.
    env_file:
      - .env
      - .env.deploy-override
    environment:
      BABYBRAIN_DB_PATH: /data/babybrain.db
      BABYBRAIN_HTML_ARCHIVE_PATH: /data/scrape-html
      # Per-source scrape time overrides. Default slot is 06:30 UTC (set in
      # DailyScrapeService). Add lines like the example below to move a
      # specific source to a different slot. Quote the value to stop YAML
      # parsing HH:mm as a time literal.
      #   BABYBRAIN_SCRAPE_OVERRIDES__some_source_id: "08:00"
    # NB: no `ports:` block — Caddy is the only public face.
    volumes:
      - ./data:/data

volumes:
  caddy_data:
  caddy_config:
