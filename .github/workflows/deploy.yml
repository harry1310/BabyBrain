name: Deploy

# Auto-deploy on every push to main. Env overrides flow to the box's
# .env.deploy-override (deploy.sh writes it; docker-compose loads it on top of
# .env). Two sources, both wired in the `script:` block below:
#   * workflow_dispatch inputs  — e.g. scrape_on_startup.
#   * repo secrets              — KEY=${{ secrets.KEY }}.
# A secret that isn't set expands to a bare `KEY=`, which deploy.sh drops, so
# the value already in .env on the box is left untouched. Set the secret and
# the next deploy overrides the box. Managing a new variable = one line in the
# `script:` block (plus, for an input, one entry under `inputs:`).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scrape_on_startup:
        description: 'Run scrape immediately after deploy'
        type: boolean
        default: false

# Serialise deploys. If two commits land back-to-back, the second one waits
# for the first to finish rather than racing the docker build.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH and run deploy script
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          # authorized_keys forces command=/opt/babybrain/scripts/deploy.sh,
          # but the script value below is preserved in $SSH_ORIGINAL_COMMAND.
          # deploy.sh parses any KEY=VALUE tokens from there and writes them
          # to .env.deploy-override, which docker-compose loads as an env_file
          # on top of .env. Adding a new override variable = one line below
          # plus one input declaration above.
          request_pty: false
          command_timeout: 10m
          # Each secrets.* below is a no-op unless that repo secret is set —
          # an unset secret expands to `KEY=` and deploy.sh drops it. Values
          # must be free of spaces and shell metacharacters (token-passed via
          # $SSH_ORIGINAL_COMMAND); fine for keys/tokens, mind the password.
          script: |
            /opt/babybrain/scripts/deploy.sh \
              BABYBRAIN_SCRAPE_ON_STARTUP=${{ inputs.scrape_on_startup || 'false' }} \
              ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
              BABYBRAIN_GH_TOKEN=${{ secrets.BABYBRAIN_GH_TOKEN }} \
              BABYBRAIN_GH_REPO=${{ secrets.BABYBRAIN_GH_REPO }} \
              BABYBRAIN_ADMIN_USER=${{ secrets.BABYBRAIN_ADMIN_USER }} \
              BABYBRAIN_ADMIN_PASSWORD=${{ secrets.BABYBRAIN_ADMIN_PASSWORD }} \
              BABYBRAIN_SCRAPERAPI_KEY=${{ secrets.BABYBRAIN_SCRAPERAPI_KEY }}
